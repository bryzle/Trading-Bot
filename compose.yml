services:
  # Traditional Trading Bot
  tradingbot:
    build: .
    entrypoint: /bin/bash
    volumes:
      - .:/app
    environment:
      API_KEY: ${API_KEY}
      API_SECRET: ${API_SECRET}
      API_URL: ${API_URL}
      
  # TradingEdge AI FastAPI Server
  api:
    build: .
    command: uvicorn tradingbot_edge.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      API_KEY: ${API_KEY}
      API_SECRET: ${API_SECRET}
      API_URL: ${API_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}